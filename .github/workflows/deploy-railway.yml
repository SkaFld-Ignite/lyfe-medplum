name: Deploy to Railway

concurrency:
  group: deploy-railway
  cancel-in-progress: false

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  SERVER_IMAGE: ghcr.io/${{ github.repository_owner }}/lyfe-medplum-server
  APP_IMAGE: ghcr.io/${{ github.repository_owner }}/lyfe-medplum-app

jobs:
  build-and-push:
    name: Build & Push Images
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        run: |
          echo "sha_short=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
          echo "version=$(node -p 'require("./package.json").version')" >> $GITHUB_OUTPUT

      - name: Build & push server image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: railway/Dockerfile.server
          push: true
          tags: |
            ${{ env.SERVER_IMAGE }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.SERVER_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.SERVER_IMAGE }}:latest
          cache-from: type=gha,scope=server
          cache-to: type=gha,mode=max,scope=server

      - name: Build & push app image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: railway/Dockerfile.app
          push: true
          tags: |
            ${{ env.APP_IMAGE }}:${{ steps.meta.outputs.sha_short }}
            ${{ env.APP_IMAGE }}:${{ steps.meta.outputs.version }}
            ${{ env.APP_IMAGE }}:latest
          cache-from: type=gha,scope=app
          cache-to: type=gha,mode=max,scope=app

  deploy:
    name: Deploy to Railway
    needs: build-and-push
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Trigger Railway redeploy
        env:
          WEBHOOK_SERVER: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK_SERVER }}
          WEBHOOK_APP: ${{ secrets.RAILWAY_DEPLOY_WEBHOOK_APP }}
        run: |
          if [[ -z "$WEBHOOK_SERVER" ]]; then echo "Missing RAILWAY_DEPLOY_WEBHOOK_SERVER secret" && exit 1; fi
          if [[ -z "$WEBHOOK_APP" ]]; then echo "Missing RAILWAY_DEPLOY_WEBHOOK_APP secret" && exit 1; fi

          curl -X POST "$WEBHOOK_SERVER" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error

          curl -X POST "$WEBHOOK_APP" \
            -H "Content-Type: application/json" \
            --fail --silent --show-error

          echo "Railway redeploy triggered successfully"
